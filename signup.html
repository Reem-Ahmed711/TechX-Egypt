<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechX Egypt — Sign Up</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">
<div class="auth-bg"></div>
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-mark"><i class="fas fa-bolt"></i></div>
  </div>
  <h1 class="auth-title">Join TechX</h1>
  <p style="text-align:center; color:#64748b; margin-bottom:32px;">Create your free account</p>
  <form id="signupForm">
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Ahmed Hassan" required/>
    </div>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="your@email.com" required/>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 6 characters" required/>
    </div>
    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="signupConfirm" placeholder="Repeat your password" required/>
    </div>
    <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Create Account</button>
  </form>
  <div class="auth-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>
<script>
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    
    if(name === '') {
      alert('Please enter your full name');
      return;
    }
    if(email === '') {
      alert('Please enter your email');
      return;
    }
    if(password.length < 6) {
      alert('Password must be at least 6 characters');
      return;
    }
    if(password !== confirm) {
      alert('Passwords do not match');
      return;
    }
    
    let users = JSON.parse(localStorage.getItem('techx_users') || '[]');
    
    if(users.find(u => u.email === email)) {
      alert('Email already exists. Please login.');
      window.location.href = 'login.html';
      return;
    }
    
    const newUser = {
      name: name,
      email: email,
      password: password,
      role: 'user',
      joined: new Date().toLocaleDateString()
    };
    
    users.push(newUser);
    localStorage.setItem('techx_users', JSON.stringify(users));
    
    alert('Account created successfully! Please login.');
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
